name: update-data

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@cb0fda56a307b8c78d38320cd40d9eb22a3bf04e  # v1.315.0
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Fetch latest IATA dataset from Wikidata
        run: bundle exec rake iata:fetch

      - name: Verify fetch
        run: |
          ENTRY_COUNT=$(jq -r '._meta.entry_count' lib/iata/data/airports.json)
          echo "New entry count: $ENTRY_COUNT"
          if [ "$ENTRY_COUNT" -lt 1 ]; then
            echo "::error::airports.json has no entries"
            exit 1
          fi

      - name: Create branch, commit, push
        run: |
          BRANCH="chore/refresh-from-wikidata"
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git checkout -b "$BRANCH"
          git add lib/iata/data/airports.json
          git commit -m "Refresh IATA dataset from Wikidata"
          git push origin "$BRANCH"

      - name: Open PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="chore/refresh-from-wikidata"
          ENTRY_COUNT=$(jq -r '._meta.entry_count' lib/iata/data/airports.json)
          FETCHED=$(jq -r '._meta.fetched_at' lib/iata/data/airports.json)
          BODY=$(cat <<EOF
          ## What
          Refreshes the bundled IATA airport list from Wikidata.

          - \`lib/iata/data/airports.json\` — refreshed dataset
          - Entry count: \`$ENTRY_COUNT\`
          - Fetched: \`$FETCHED\`

          Source: [Wikidata property P238](https://www.wikidata.org/wiki/Property:P238)

          ## After merge
          Trigger the **release** workflow with \`next_version=patch\` to publish a new gem version containing the new data.
          EOF
          )
          gh pr create \
            --title "Refresh IATA dataset from Wikidata" \
            --body "$BODY" \
            --base main \
            --head "$BRANCH" \
            --label data-update